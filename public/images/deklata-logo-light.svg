<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72" role="img" aria-label="Deklata">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#236b47"/>
      <stop offset="100%" stop-color="#1a5c3a"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f2bb38"/>
      <stop offset="100%" stop-color="#e8a020"/>
    </linearGradient>
    <linearGradient id="textFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1e6640"/>
      <stop offset="100%" stop-color="#1a5c3a"/>
    </linearGradient>
    <filter id="shadow" x="-6%" y="-6%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5"
        flood-color="#0a2e1a" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════
       ICON MARK — matches favicon
       ═══════════════════════════ -->
  <g filter="url(#shadow)">

    <!-- Rounded square background — forest green -->
    <rect x="0" y="0" width="72" height="72" rx="14" fill="url(#iconBg)"/>

    <!-- ── D letterform (white) ── -->
    <!-- Left vertical stem -->
    <rect x="12" y="11" width="13" height="42" rx="1" fill="white"/>

    <!-- D bowl — outer white shape -->
    <path d="
      M 25 11
      L 36 11
      C 55 11 63 20 63 32
      C 63 44 55 53 36 53
      L 25 53
      Z
    " fill="white"/>

    <!-- D counter — green square punched out of the bowl -->
    <!-- Matches the square shape visible in the favicon exactly -->
    <rect x="25" y="20" width="22" height="24" rx="1" fill="url(#iconBg)"/>

    <!-- ── Gold bar at bottom — matches favicon exactly ── -->
    <rect x="8" y="59" width="56" height="7" rx="3.5" fill="url(#goldBar)"/>

  </g>

  <!-- ═══════════════════════════
       WORDMARK
       ═══════════════════════════ -->
  <text x="86" y="50"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="700" font-size="40" letter-spacing="-0.5"
    fill="url(#textFill)">Deklata</text>

  <!-- Thin gold underline echoing the icon's gold bar -->
  <line x1="86" y1="61" x2="366" y2="61"
        stroke="url(#goldBar)" stroke-width="3.5"
        stroke-linecap="round" opacity="0.9"/>

</svg>
